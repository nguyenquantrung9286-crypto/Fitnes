<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fitnes — Панель тренера</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, system-ui, sans-serif; background: #0C0C16; color: #fff; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  textarea, input { font-family: Inter, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Data -->
<script src="trainer-data.js"></script>

<!-- Layout -->
<script type="text/babel" src="trainer-layout.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="trainer-screens1.jsx"></script>
<script type="text/babel" src="trainer-screens2.jsx"></script>
<script type="text/babel" src="trainer-screens3.jsx"></script>

<!-- App -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7C3AED",
  "cardBg": "#18181B",
  "pageBg": "#0C0C16",
  "sidebarWidth": 240
}/*EDITMODE-END*/;

function App() {
  const [loggedIn, setLoggedIn] = React.useState(false);
  const [screen, setScreen] = React.useState("dashboard");
  const [clientId, setClientId] = React.useState(null);
  const [isOnline, setIsOnline] = React.useState(true);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // Tweaks edit mode listener
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
  };

  if (!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)} />;

  const navScreen = screen.startsWith("client") ? "clients" : screen;

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", fontFamily: "Inter, sans-serif" }}>
      <Sidebar screen={navScreen} setScreen={(s) => { setScreen(s); setClientId(null); }} isOnline={isOnline} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: tweaks.pageBg }}>
        <TopBar screen={screen} setScreen={setScreen} clientId={clientId} />
        <main style={{ flex: 1, overflowY: "auto", padding: 24 }}>
          {screen === "dashboard" && <DashboardScreen setScreen={setScreen} setClientId={setClientId} />}
          {screen === "clients" && <ClientsScreen setScreen={setScreen} setClientId={setClientId} />}
          {screen === "client-profile" && clientId && <ClientProfileScreen clientId={clientId} setScreen={setScreen} setClientId={setClientId} />}
          {(screen === "chat" || screen === "client-chat") && (
            <ChatScreen clientId={clientId || MOCK_CLIENTS.find(c => MOCK_MESSAGES[c.id])?.id} setClientId={setClientId} setScreen={setScreen} />
          )}
          {screen === "assign" && clientId && <AssignScreen clientId={clientId} setScreen={setScreen} />}
          {screen === "settings" && <SettingsScreen isOnline={isOnline} setIsOnline={setIsOnline} onLogout={() => setLoggedIn(false)} />}
        </main>
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position: "fixed", bottom: 20, right: 20, width: 260, background: "#1E1E2E",
          border: "1px solid rgba(255,255,255,0.12)", borderRadius: 16, padding: 20, zIndex: 9999,
          boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Tweaks</div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 6 }}>Акцентный цвет</div>
            <div style={{ display: "flex", gap: 8 }}>
              {["#7C3AED", "#2563EB", "#059669", "#D97706", "#DC2626"].map(c => (
                <div key={c} onClick={() => updateTweak("accentColor", c)} style={{
                  width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer",
                  border: tweaks.accentColor === c ? "2px solid #fff" : "2px solid transparent",
                  transition: "border 0.15s",
                }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 6 }}>Фон страниц</div>
            <div style={{ display: "flex", gap: 8 }}>
              {["#0C0C16", "#09090B", "#0F172A", "#111827"].map(c => (
                <div key={c} onClick={() => updateTweak("pageBg", c)} style={{
                  width: 28, height: 28, borderRadius: 6, background: c, cursor: "pointer",
                  border: tweaks.pageBg === c ? "2px solid #A78BFA" : "2px solid rgba(255,255,255,0.1)",
                }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 6 }}>Статус тренера</div>
            <div onClick={() => setIsOnline(v => !v)} style={{
              display: "flex", alignItems: "center", gap: 8, cursor: "pointer",
              padding: "8px 12px", borderRadius: 8,
              background: isOnline ? "rgba(61,216,122,0.1)" : "rgba(107,114,128,0.1)",
            }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: isOnline ? "#3DD87A" : "#6B7280" }} />
              <span style={{ fontSize: 13, color: isOnline ? "#3DD87A" : "#9CA3AF" }}>
                {isOnline ? "Онлайн" : "Оффлайн"}
              </span>
            </div>
          </div>

          <div>
            <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 8 }}>Быстрый переход</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {[
                ["Дашборд", "dashboard"],
                ["Клиенты", "clients"],
                ["Чаты", "chat"],
                ["Профиль клиента", () => { setClientId(MOCK_CLIENTS[0].id); setScreen("client-profile"); }],
                ["Настройки", "settings"],
              ].map(([label, action]) => (
                <button key={label}
                  onClick={() => typeof action === "function" ? action() : setScreen(action)}
                  style={{
                    padding: "7px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer", textAlign: "left",
                    border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.04)", color: "#e5e7eb",
                  }}>{label}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
